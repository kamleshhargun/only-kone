<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Invoice Generator</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:#f3f4f6;
    padding:20px;
}

.container{
    max-width:1200px;
    margin:auto;
}

.topbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    flex-wrap:wrap;
    gap:15px;
    margin-bottom:20px;
}

.type-box{
    display:flex;
    gap:10px;
}

.type-btn{
    background:#111827;
    color:#fff;
    border:none;
    padding:12px 22px;
    border-radius:10px;
    cursor:pointer;
    font-size:15px;
    font-weight:600;
}

.action-box{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
}

.action-btn{
    border:none;
    padding:12px 22px;
    border-radius:10px;
    cursor:pointer;
    font-size:14px;
    font-weight:600;
    color:#fff;
}

.print-btn{
    background:#2563eb;
}

.save-btn{
    background:#16a34a;
}

.invoice{
    background:#fff;
    border-radius:20px;
    padding:30px;
    box-shadow:0 10px 30px rgba(0,0,0,0.08);
}

.invoice-title{
    font-size:32px;
    font-weight:700;
    margin-bottom:30px;
    color:#111827;
}

.input-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:18px;
    margin-bottom:30px;
}

.input-box{
    background:#fff;
    border:2px solid #e5e7eb;
    border-radius:14px;
    padding:14px;
}

.input-box label{
    display:block;
    font-size:13px;
    font-weight:600;
    color:#6b7280;
    margin-bottom:8px;
}

.input-box input{
    width:100%;
    border:none;
    outline:none;
    font-size:15px;
    color:#111827;
    background:transparent;
}

.table-responsive{
    overflow:auto;
}

table{
    width:100%;
    border-collapse:collapse;
}

table th{
    background:#111827;
    color:#fff;
    padding:14px;
    font-size:14px;
    text-align:left;
}

table td{
    border:1px solid #e5e7eb;
    padding:10px;
}

table input{
    width:100%;
    border:none;
    outline:none;
    font-size:14px;
}

.amount{
    font-weight:600;
}

.add-row{
    margin-top:18px;
    background:#111827;
    color:#fff;
    border:none;
    padding:12px 18px;
    border-radius:10px;
    cursor:pointer;
    font-size:14px;
    font-weight:600;
}

.summary{
    width:350px;
    margin-left:auto;
    margin-top:35px;
}

.summary table td{
    padding:12px;
    font-size:15px;
}

.total-row{
    background:#16a34a;
    color:#fff;
    font-weight:700;
}

@media(max-width:768px){

    .invoice{
        padding:18px;
    }

    .invoice-title{
        font-size:24px;
    }

    .summary{
        width:100%;
    }
}

@media print{

    .topbar,
    .add-row{
        display:none;
    }

    body{
        background:#fff;
        padding:0;
    }

    .invoice{
        box-shadow:none;
    }
}

</style>
</head>

<body>

<div class="container">

    <div class="topbar">

        <div class="type-box">

            <button class="type-btn" onclick="setInvoiceType('PURCHASE INVOICE')">
                Purchase
            </button>

            <button class="type-btn" onclick="setInvoiceType('SALES INVOICE')">
                Sales
            </button>

        </div>

        <div class="action-box">

            <button class="action-btn print-btn" onclick="window.print()">
                Print Invoice
            </button>

            <button class="action-btn save-btn" onclick="saveInvoice()">
                Save Invoice
            </button>

        </div>

    </div>

    <div class="invoice" id="invoice">

        <div class="invoice-title" id="invoiceType">
            PURCHASE INVOICE
        </div>

        <div class="input-grid">

            <div class="input-box">
                <label>Company Name</label>
                <input type="text" id="companyName" autofocus>
            </div>

            <div class="input-box">
                <label>Invoice No</label>
                <input type="text">
            </div>

            <div class="input-box">
                <label>Invoice Date</label>
                <input type="date" id="invoiceDate">
            </div>

        </div>

        <div class="table-responsive">

            <table id="invoiceTable">

                <thead>

                    <tr>
                        <th>#</th>
                        <th>Item Description</th>
                        <th>Qty</th>
                        <th>Rate</th>
                        <th>GST %</th>
                        <th>Total</th>
                    </tr>

                </thead>

                <tbody>

                    <tr>

                        <td>1</td>

                        <td>
                            <input type="text" placeholder="Item Name">
                        </td>

                        <td>
                            <input type="number" value="1" class="qty" oninput="calculateTotal()">
                        </td>

                        <td>
                            <input type="number" value="0" class="rate" oninput="calculateTotal()">
                        </td>

                        <td>
                            <input type="number" value="18" class="gst" oninput="calculateTotal()">
                        </td>

                        <td class="amount">
                            0.00
                        </td>

                    </tr>

                </tbody>

            </table>

        </div>

        <button class="add-row" onclick="addRow()">
            + Add Item
        </button>

        <div class="summary">

            <table>

                <tr>
                    <td>Subtotal</td>
                    <td id="subtotal">0.00</td>
                </tr>

                <tr>
                    <td>GST Total</td>
                    <td id="gstTotal">0.00</td>
                </tr>

                <tr class="total-row">
                    <td>Grand Total</td>
                    <td id="grandTotal">0.00</td>
                </tr>

            </table>

        </div>

    </div>

</div>

<script>

function setInvoiceType(type){

    document.getElementById("invoiceType").innerText = type;

}

function addRow(){

    const table = document.querySelector("#invoiceTable tbody");

    const rowCount = table.rows.length + 1;

    const row = table.insertRow();

    row.innerHTML = `

        <td>${rowCount}</td>

        <td>
            <input type="text" placeholder="Item Name">
        </td>

        <td>
            <input type="number" value="1" class="qty" oninput="calculateTotal()">
        </td>

        <td>
            <input type="number" value="0" class="rate" oninput="calculateTotal()">
        </td>

        <td>
            <input type="number" value="18" class="gst" oninput="calculateTotal()">
        </td>

        <td class="amount">
            0.00
        </td>

    `;

    calculateTotal();
}

function calculateTotal(){

    const rows = document.querySelectorAll("#invoiceTable tbody tr");

    let subtotal = 0;
    let gstTotal = 0;

    rows.forEach(row => {

        const qty = parseFloat(row.querySelector(".qty").value) || 0;

        const rate = parseFloat(row.querySelector(".rate").value) || 0;

        const gst = parseFloat(row.querySelector(".gst").value) || 0;

        const amount = qty * rate;

        const gstAmount = (amount * gst) / 100;

        const total = amount + gstAmount;

        row.querySelector(".amount").innerText = total.toFixed(2);

        subtotal += amount;

        gstTotal += gstAmount;

    });

    const grandTotal = subtotal + gstTotal;

    document.getElementById("subtotal").innerText = subtotal.toFixed(2);

    document.getElementById("gstTotal").innerText = gstTotal.toFixed(2);

    document.getElementById("grandTotal").innerText = grandTotal.toFixed(2);

}

function saveInvoice(){

    const invoiceContent = document.getElementById("invoice").innerHTML;

    localStorage.setItem("savedInvoice", invoiceContent);

    alert("Invoice Saved Successfully!");

}

window.onload = function(){

    calculateTotal();

    // Auto current date
    const today = new Date().toISOString().split('T')[0];

    document.getElementById("invoiceDate").value = today;

    // Auto focus on company name
    document.getElementById("companyName").focus();

}

</script>

</body>
</html>
