<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Fabric Invoice Generator</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
}

body{
  background:#f3f4f6;
  padding:20px;
}

.container{
  max-width:1300px;
  margin:auto;
}

.topbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  flex-wrap:wrap;
  gap:10px;
  margin-bottom:20px;
}

.left-top,
.right-top{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  align-items:center;
}

button{
  border:none;
  padding:12px 20px;
  border-radius:12px;
  cursor:pointer;
  color:#fff;
  font-size:14px;
  font-weight:600;
}

.dark{
  background:#111827;
}

.green{
  background:#16a34a;
}

.blue{
  background:#2563eb;
}

.red{
  background:#dc2626;
}

.invoice{
  background:#fff;
  padding:30px;
  border-radius:20px;
  box-shadow:0 10px 30px rgba(0,0,0,0.08);
}

.title{
  font-size:32px;
  font-weight:700;
  margin-bottom:30px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:18px;
  margin-bottom:30px;
}

.box{
  border:2px solid #e5e7eb;
  border-radius:14px;
  padding:14px;
  position:relative;
}

.box label{
  display:block;
  font-size:13px;
  font-weight:600;
  margin-bottom:8px;
  color:#6b7280;
}

.box input{
  width:100%;
  border:none;
  outline:none;
  font-size:15px;
}

.suggestions{
  position:absolute;
  left:0;
  right:0;
  top:100%;
  background:#fff;
  border:1px solid #ddd;
  border-radius:10px;
  overflow:hidden;
  max-height:180px;
  overflow-y:auto;
  display:none;
  z-index:999;
}

.suggestions div{
  padding:10px;
  cursor:pointer;
  border-bottom:1px solid #eee;
}

.suggestions div:hover{
  background:#f3f4f6;
}

table{
  width:100%;
  border-collapse:collapse;
}

th{
  background:#111827;
  color:#fff;
  padding:14px;
  font-size:14px;
}

td{
  border:1px solid #e5e7eb;
  padding:10px;
  text-align:center;
  position:relative;
}

td input{
  width:100%;
  border:none;
  outline:none;
  text-align:center;
  font-size:14px;
}

.remove-btn{
  background:#dc2626;
  padding:8px 12px;
  font-size:12px;
}

.add-btn{
  margin-top:20px;
}

.status-box{
  display:flex;
  align-items:center;
  gap:8px;
  background:#fff;
  padding:10px 15px;
  border-radius:12px;
  border:1px solid #ddd;
}

.dot{
  width:14px;
  height:14px;
  border-radius:50%;
  background:#dc2626;
}

.saved{
  margin-top:40px;
}

.saved h2{
  margin-bottom:15px;
}

@media print{

  .topbar,
  .saved,
  .add-btn,
  .remove-btn,
  .edit-btn,
  .delete-btn{
    display:none !important;
  }

  body{
    background:#fff;
    padding:0;
  }

  .invoice{
    box-shadow:none;
  }

}

</style>

</head>

<body>

<div class="container">

  <div class="topbar">

    <div class="left-top">

      <button class="dark" onclick="setInvoiceType('PURCHASE INVOICE')">
        Purchase
      </button>

      <button class="dark" onclick="setInvoiceType('SALES INVOICE')">
        Sales
      </button>

    </div>

    <div class="right-top">

      <div class="status-box">

        <div class="dot" id="apiDot"></div>

        <span id="apiText">
          Unlive
        </span>

      </div>

      <button class="blue" onclick="window.print()">
        Print Invoice
      </button>

      <button class="green" onclick="saveInvoice()">
        Save Invoice
      </button>

    </div>

  </div>

  <div class="invoice">

    <div class="title" id="invoiceType">
      PURCHASE INVOICE
    </div>

    <div class="grid">

      <div class="box">

        <label>Company Name</label>

        <input type="text" id="companyName" autocomplete="off">

        <div class="suggestions" id="companySuggestions"></div>

      </div>

      <div class="box">

        <label>Invoice No</label>

        <input type="text" id="invoiceNo">

      </div>

      <div class="box">

        <label>Invoice Date</label>

        <input type="date" id="invoiceDate">

      </div>

    </div>

    <table id="invoiceTable">

      <thead>

        <tr>

          <th>#</th>
          <th>SKUS' FABRIC</th>
          <th>MTR</th>
          <th>Action</th>

        </tr>

      </thead>

      <tbody>

        <tr>

          <td>1</td>

          <td>

            <input type="text" class="fabric" autocomplete="off">

            <div class="suggestions"></div>

          </td>

          <td>

            <input 
              type="number"
              step="0.01"
              class="mtr"
            >

          </td>

          <td>

            <button class="remove-btn" onclick="removeRow(this)">
              Remove
            </button>

          </td>

        </tr>

      </tbody>

    </table>

    <button class="dark add-btn" onclick="addRow()">
      + Add Item
    </button>

  </div>

  <div class="saved">

    <h2>Saved Invoice</h2>

    <table>

      <thead>

        <tr>

          <th>Invoice Type</th>
          <th>Company</th>
          <th>Invoice No</th>
          <th>Date</th>
          <th>Action</th>

        </tr>

      </thead>

      <tbody id="savedInvoiceBody"></tbody>

    </table>

  </div>

</div>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbzWMJSMlWQiIvW3cLsdkJMaqyrKOWpM44gQQePiCiiy-_9uU1ATkTriklOqWXjPwAjn/exec";

let companies = [];
let fabrics = [];

async function apiRequest(payload){

  const response = await fetch(API_URL,{

    method:"POST",

    headers:{
      "Content-Type":"text/plain"
    },

    body:JSON.stringify(payload)

  });

  return await response.json();

}

async function checkAPI(){

  try{

    const response = await fetch(API_URL + "?t=" + Date.now());

    const data = await response.json();

    if(data.status === "success"){

      document.getElementById("apiDot").style.background = "#16a34a";

      document.getElementById("apiText").innerText = "Live";

    }

  }

  catch(error){

    document.getElementById("apiDot").style.background = "#dc2626";

    document.getElementById("apiText").innerText = "Unlive";

  }

}

function setInvoiceType(type){

  document.getElementById("invoiceType").innerText = type;

}

function addRow(){

  const tbody = document.querySelector("#invoiceTable tbody");

  const rowCount = tbody.rows.length + 1;

  const row = tbody.insertRow();

  row.innerHTML = `

    <td>${rowCount}</td>

    <td>

      <input type="text" class="fabric" autocomplete="off">

      <div class="suggestions"></div>

    </td>

    <td>

      <input 
        type="number"
        step="0.01"
        class="mtr"
      >

    </td>

    <td>

      <button class="remove-btn" onclick="removeRow(this)">
        Remove
      </button>

    </td>

  `;

  setupFabricSearch(row);

}

function removeRow(button){

  const yes = confirm("Are you sure?");

  if(yes){

    button.closest("tr").remove();

    updateRowNumbers();

  }

}

function updateRowNumbers(){

  document.querySelectorAll("#invoiceTable tbody tr").forEach((row,index)=>{

    row.cells[0].innerText = index + 1;

  });

}

async function saveInvoice(){

  const companyName = document.getElementById("companyName").value.trim();

  if(!companies.includes(companyName)){

    alert("Select valid company name");

    return;

  }

  const items = [];

  let invalidFabric = false;

  document.querySelectorAll("#invoiceTable tbody tr").forEach(row=>{

    const fabric = row.querySelector(".fabric").value.trim();

    if(!fabrics.includes(fabric)){

      invalidFabric = true;

    }

    items.push({

      fabric : fabric,
      mtr : row.querySelector(".mtr").value

    });

  });

  if(invalidFabric){

    alert("Select valid fabric");

    return;

  }

  const payload = {

    action : "saveInvoice",

    invoiceType : document.getElementById("invoiceType").innerText,

    companyName : companyName,

    invoiceNo : document.getElementById("invoiceNo").value,

    invoiceDate : document.getElementById("invoiceDate").value,

    items : items

  };

  const result = await apiRequest(payload);

  if(result.status === "saved"){

    alert("Invoice Saved");

    loadSavedInvoices();

    resetInvoice();

  }

}

function resetInvoice(){

  document.getElementById("companyName").value = "";

  document.getElementById("invoiceNo").value = "";

  document.getElementById("invoiceDate").value =
  new Date().toISOString().split('T')[0];

  document.getElementById("invoiceType").innerText =
  "PURCHASE INVOICE";

  const tbody = document.querySelector("#invoiceTable tbody");

  tbody.innerHTML = "";

  addRow();

  document.getElementById("companyName").focus();

}

async function loadSavedInvoices(){

  const result = await apiRequest({

    action : "getInvoices"

  });

  const tbody = document.getElementById("savedInvoiceBody");

  tbody.innerHTML = "";

  result.forEach((row,index)=>{

    tbody.innerHTML += `

      <tr>

        <td>${row[0]}</td>
        <td>${row[1]}</td>
        <td>${row[2]}</td>
        <td>${formatDate(row[3])}</td>

        <td>

          <button 
            class="blue edit-btn"
            onclick="editInvoice(${index})"
          >
            Edit
          </button>

          <button 
            class="red delete-btn"
            onclick="deleteInvoice(${index})"
          >
            Delete
          </button>

        </td>

      </tr>

    `;

  });

}

function formatDate(dateString){

  const date = new Date(dateString);

  const day = String(date.getDate()).padStart(2,'0');

  const month = String(date.getMonth() + 1).padStart(2,'0');

  const year = date.getFullYear();

  return `${day}-${month}-${year}`;

}

async function editInvoice(index){

  const result = await apiRequest({

    action : "getInvoices"

  });

  const row = result[index];

  document.getElementById("invoiceType").innerText = row[0];

  document.getElementById("companyName").value = row[1];

  document.getElementById("invoiceNo").value = row[2];

  document.getElementById("invoiceDate").value =
  new Date(row[3]).toISOString().split('T')[0];

  const tbody = document.querySelector("#invoiceTable tbody");

  tbody.innerHTML = `

    <tr>

      <td>1</td>

      <td>

        <input 
          type="text" 
          class="fabric"
          value="${row[4]}"
          autocomplete="off"
        >

        <div class="suggestions"></div>

      </td>

      <td>

        <input 
          type="number"
          step="0.01"
          class="mtr"
          value="${row[5]}"
        >

      </td>

      <td>

        <button class="remove-btn" onclick="removeRow(this)">
          Remove
        </button>

      </td>

    </tr>

  `;

  setupFabricSearch(document.querySelector("#invoiceTable tbody tr"));

  window.scrollTo({

    top:0,
    behavior:"smooth"

  });

}

async function deleteInvoice(index){

  const yes = confirm("Are you sure want to delete invoice?");

  if(!yes){

    return;

  }

  const result = await apiRequest({

    action : "deleteInvoice",
    index : index

  });

  if(result.status === "deleted"){

    alert("Invoice Deleted");

    loadSavedInvoices();

  }

}

function setupCompanySearch(){

  const input = document.getElementById("companyName");

  const box = document.getElementById("companySuggestions");

  input.addEventListener("input",function(){

    const value = this.value.toLowerCase();

    box.innerHTML = "";

    if(!value){

      box.style.display = "none";

      return;

    }

    const filtered = companies.filter(item=>

      item.toLowerCase().includes(value)

    );

    filtered.forEach(item=>{

      const div = document.createElement("div");

      div.innerText = item;

      div.onclick = function(){

        input.value = item;

        box.style.display = "none";

      }

      box.appendChild(div);

    });

    box.style.display = filtered.length ? "block" : "none";

  });

}

function setupFabricSearch(row){

  const input = row.querySelector(".fabric");

  const box = row.querySelector(".suggestions");

  input.addEventListener("input",function(){

    const value = this.value.toLowerCase();

    box.innerHTML = "";

    if(!value){

      box.style.display = "none";

      return;

    }

    const filtered = fabrics.filter(item=>

      item.toLowerCase().includes(value)

    );

    filtered.forEach(item=>{

      const div = document.createElement("div");

      div.innerText = item;

      div.onclick = function(){

        input.value = item;

        box.style.display = "none";

      }

      box.appendChild(div);

    });

    box.style.display = filtered.length ? "block" : "none";

  });

}

window.onload = async function(){

  document.getElementById("invoiceDate").value =
  new Date().toISOString().split('T')[0];

  document.getElementById("companyName").focus();

  checkAPI();

  companies = await apiRequest({

    action : "getCompanies"

  });

  fabrics = await apiRequest({

    action : "getFabrics"

  });

  setupCompanySearch();

  setupFabricSearch(document.querySelector("#invoiceTable tbody tr"));

  loadSavedInvoices();

}

</script>

</body>
</html>
