<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>GST Invoice Generator</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:#f3f4f6;
    padding:20px;
}

.container{
    max-width:1250px;
    margin:auto;
}

.topbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:15px;
    flex-wrap:wrap;
    margin-bottom:20px;
}

.type-box,
.action-box{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
}

.btn{
    border:none;
    padding:12px 22px;
    border-radius:12px;
    cursor:pointer;
    font-size:14px;
    font-weight:600;
    color:#fff;
}

.dark-btn{
    background:#111827;
}

.blue-btn{
    background:#2563eb;
}

.green-btn{
    background:#16a34a;
}

.invoice{
    background:#fff;
    border-radius:20px;
    padding:30px;
    box-shadow:0 10px 30px rgba(0,0,0,0.08);
}

.invoice-title{
    font-size:32px;
    font-weight:700;
    color:#111827;
    margin-bottom:30px;
}

.input-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:18px;
    margin-bottom:30px;
}

.input-box{
    background:#fff;
    border:2px solid #e5e7eb;
    border-radius:14px;
    padding:14px;
}

.input-box label{
    display:block;
    margin-bottom:8px;
    font-size:13px;
    font-weight:600;
    color:#6b7280;
}

.input-box input{
    width:100%;
    border:none;
    outline:none;
    font-size:15px;
    background:transparent;
}

.table-responsive{
    overflow:auto;
}

table{
    width:100%;
    border-collapse:collapse;
}

table th{
    background:#111827;
    color:#fff;
    padding:14px;
    font-size:14px;
    text-align:center;
}

table td{
    border:1px solid #e5e7eb;
    padding:10px;
    text-align:center;
}

table input{
    width:100%;
    border:none;
    outline:none;
    text-align:center;
    font-size:14px;
}

.gst-box{
    display:flex;
    flex-direction:column;
    gap:6px;
}

.gst-box label{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:6px;
    font-size:12px;
}

.add-row{
    margin-top:18px;
}

.summary{
    width:400px;
    margin-left:auto;
    margin-top:30px;
}

.summary td{
    padding:12px;
    font-size:15px;
}

.total-row{
    background:#16a34a;
    color:#fff;
    font-weight:700;
}

.saved-section{
    margin-top:40px;
}

.saved-title{
    font-size:24px;
    font-weight:700;
    margin-bottom:18px;
    color:#111827;
}

.saved-table{
    background:#fff;
    border-radius:16px;
    overflow:hidden;
    box-shadow:0 5px 20px rgba(0,0,0,0.06);
}

.saved-table table{
    width:100%;
}

.saved-table th{
    background:#111827;
    color:#fff;
}

.saved-table td{
    background:#fff;
}

@media(max-width:768px){

    .invoice{
        padding:18px;
    }

    .invoice-title{
        font-size:24px;
    }

    .summary{
        width:100%;
    }
}

@media print{

    body{
        background:#fff;
        padding:0;
    }

    .topbar,
    .saved-section,
    .add-row{
        display:none !important;
    }

    .invoice{
        box-shadow:none;
        border-radius:0;
        padding:0;
    }
}

</style>
</head>

<body>

<div class="container">

    <div class="topbar">

        <div class="type-box">

            <button class="btn dark-btn" onclick="setInvoiceType('PURCHASE INVOICE')">
                Purchase
            </button>

            <button class="btn dark-btn" onclick="setInvoiceType('SALES INVOICE')">
                Sales
            </button>

        </div>

        <div class="action-box">

            <button class="btn blue-btn" onclick="printInvoice()">
                Print Invoice
            </button>

            <button class="btn green-btn" onclick="saveInvoice()">
                Save Invoice
            </button>

        </div>

    </div>

    <div class="invoice" id="invoiceArea">

        <div class="invoice-title" id="invoiceType">
            PURCHASE INVOICE
        </div>

        <div class="input-grid">

            <div class="input-box">
                <label>Company Name</label>
                <input type="text" id="companyName">
            </div>

            <div class="input-box">
                <label>Invoice No</label>
                <input type="text" id="invoiceNo">
            </div>

            <div class="input-box">
                <label>Invoice Date</label>
                <input type="date" id="invoiceDate">
            </div>

        </div>

        <div class="table-responsive">

            <table id="invoiceTable">

                <thead>

                    <tr>
                        <th>#</th>
                        <th>Item Description</th>
                        <th>Qty</th>
                        <th>Rate</th>
                        <th>GST</th>
                        <th>Total</th>
                    </tr>

                </thead>

                <tbody>

                    <tr>

                        <td>1</td>

                        <td>
                            <input type="text">
                        </td>

                        <td>
                            <input type="number" class="qty" oninput="calculateTotal()">
                        </td>

                        <td>
                            <input type="number" class="rate" oninput="calculateTotal()">
                        </td>

                        <td>

                            <div class="gst-box">

                                <label>
                                    <input type="checkbox" class="sgst" onchange="calculateTotal()">
                                    SGST 2.5%
                                </label>

                                <label>
                                    <input type="checkbox" class="cgst" onchange="calculateTotal()">
                                    CGST 2.5%
                                </label>

                                <label>
                                    <input type="checkbox" class="igst" onchange="calculateTotal()">
                                    IGST 5%
                                </label>

                            </div>

                        </td>

                        <td class="amount">
                            0.00
                        </td>

                    </tr>

                </tbody>

            </table>

        </div>

        <div class="add-row">
            <button class="btn dark-btn" onclick="addRow()">
                + Add Item
            </button>
        </div>

        <div class="summary">

            <table>

                <tr>
                    <td>Subtotal</td>
                    <td id="subtotal">0.00</td>
                </tr>

                <tr>
                    <td>Total GST</td>
                    <td id="gstTotal">0.00</td>
                </tr>

                <tr class="total-row">
                    <td>Grand Total</td>
                    <td id="grandTotal">0.00</td>
                </tr>

            </table>

        </div>

    </div>

    <div class="saved-section">

        <div class="saved-title">
            Saved Invoices
        </div>

        <div class="saved-table">

            <table>

                <thead>

                    <tr>
                        <th>Invoice Type</th>
                        <th>Company Name</th>
                        <th>Invoice No</th>
                        <th>Date</th>
                        <th>Grand Total</th>
                    </tr>

                </thead>

                <tbody id="savedInvoicesBody">

                </tbody>

            </table>

        </div>

    </div>

</div>

<script>

function setInvoiceType(type){

    document.getElementById("invoiceType").innerText = type;

}

function addRow(){

    const table = document.querySelector("#invoiceTable tbody");

    const rowCount = table.rows.length + 1;

    const row = table.insertRow();

    row.innerHTML = `

        <td>${rowCount}</td>

        <td>
            <input type="text">
        </td>

        <td>
            <input type="number" class="qty" oninput="calculateTotal()">
        </td>

        <td>
            <input type="number" class="rate" oninput="calculateTotal()">
        </td>

        <td>

            <div class="gst-box">

                <label>
                    <input type="checkbox" class="sgst" onchange="calculateTotal()">
                    SGST 2.5%
                </label>

                <label>
                    <input type="checkbox" class="cgst" onchange="calculateTotal()">
                    CGST 2.5%
                </label>

                <label>
                    <input type="checkbox" class="igst" onchange="calculateTotal()">
                    IGST 5%
                </label>

            </div>

        </td>

        <td class="amount">
            0.00
        </td>

    `;

}

function calculateTotal(){

    const rows = document.querySelectorAll("#invoiceTable tbody tr");

    let subtotal = 0;
    let gstTotal = 0;

    rows.forEach(row => {

        const qty = parseFloat(row.querySelector(".qty").value) || 0;

        const rate = parseFloat(row.querySelector(".rate").value) || 0;

        const amount = qty * rate;

        let gstPercent = 0;

        if(row.querySelector(".sgst").checked){
            gstPercent += 2.5;
        }

        if(row.querySelector(".cgst").checked){
            gstPercent += 2.5;
        }

        if(row.querySelector(".igst").checked){
            gstPercent += 5;
        }

        const gstAmount = amount * gstPercent / 100;

        const finalAmount = amount + gstAmount;

        row.querySelector(".amount").innerText = finalAmount.toFixed(2);

        subtotal += amount;

        gstTotal += gstAmount;

    });

    const grandTotal = subtotal + gstTotal;

    document.getElementById("subtotal").innerText = subtotal.toFixed(2);

    document.getElementById("gstTotal").innerText = gstTotal.toFixed(2);

    document.getElementById("grandTotal").innerText = grandTotal.toFixed(2);

}

function saveInvoice(){

    const invoiceType = document.getElementById("invoiceType").innerText;

    const companyName = document.getElementById("companyName").value;

    const invoiceNo = document.getElementById("invoiceNo").value;

    const invoiceDate = document.getElementById("invoiceDate").value;

    const grandTotal = document.getElementById("grandTotal").innerText;

    const invoices = JSON.parse(localStorage.getItem("savedInvoices")) || [];

    invoices.push({
        invoiceType,
        companyName,
        invoiceNo,
        invoiceDate,
        grandTotal
    });

    localStorage.setItem("savedInvoices", JSON.stringify(invoices));

    loadSavedInvoices();

    alert("Invoice Saved Successfully!");

}

function loadSavedInvoices(){

    const invoices = JSON.parse(localStorage.getItem("savedInvoices")) || [];

    const tbody = document.getElementById("savedInvoicesBody");

    tbody.innerHTML = "";

    invoices.forEach(invoice => {

        tbody.innerHTML += `

            <tr>

                <td>${invoice.invoiceType}</td>

                <td>${invoice.companyName}</td>

                <td>${invoice.invoiceNo}</td>

                <td>${invoice.invoiceDate}</td>

                <td>${invoice.grandTotal}</td>

            </tr>

        `;

    });

}

function printInvoice(){

    window.print();

}

window.onload = function(){

    const today = new Date().toISOString().split('T')[0];

    document.getElementById("invoiceDate").value = today;

    document.getElementById("companyName").focus();

    calculateTotal();

    loadSavedInvoices();

}

</script>

</body>
</html>
