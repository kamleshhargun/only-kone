<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>GST Invoice Generator</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
}

body{
  background:#f3f4f6;
  padding:20px;
}

.container{
  max-width:1300px;
  margin:auto;
}

.topbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:10px;
  flex-wrap:wrap;
  margin-bottom:20px;
}

.left-top,
.right-top{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  align-items:center;
}

button{
  border:none;
  padding:12px 20px;
  border-radius:12px;
  cursor:pointer;
  color:#fff;
  font-size:14px;
  font-weight:600;
}

.dark{
  background:#111827;
}

.green{
  background:#16a34a;
}

.blue{
  background:#2563eb;
}

.invoice{
  background:#fff;
  padding:30px;
  border-radius:20px;
  box-shadow:0 10px 30px rgba(0,0,0,0.08);
}

.title{
  font-size:32px;
  font-weight:700;
  margin-bottom:30px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:18px;
  margin-bottom:30px;
}

.box{
  border:2px solid #e5e7eb;
  border-radius:14px;
  padding:14px;
  position:relative;
  background:#fff;
}

.box label{
  display:block;
  font-size:13px;
  font-weight:600;
  color:#6b7280;
  margin-bottom:8px;
}

.box input{
  width:100%;
  border:none;
  outline:none;
  font-size:15px;
  background:transparent;
}

.suggestions{
  position:absolute;
  left:0;
  right:0;
  top:100%;
  background:#fff;
  border:1px solid #ddd;
  border-radius:10px;
  overflow:hidden;
  max-height:180px;
  overflow-y:auto;
  display:none;
  z-index:999;
}

.suggestions div{
  padding:10px;
  cursor:pointer;
  border-bottom:1px solid #eee;
}

.suggestions div:hover{
  background:#f3f4f6;
}

table{
  width:100%;
  border-collapse:collapse;
}

th{
  background:#111827;
  color:#fff;
  padding:14px;
  font-size:14px;
}

td{
  border:1px solid #e5e7eb;
  padding:10px;
  text-align:center;
}

td input,
td select{
  width:100%;
  border:none;
  outline:none;
  text-align:center;
  font-size:14px;
}

.remove-btn{
  background:#dc2626;
  padding:8px 12px;
  font-size:12px;
}

.add-btn{
  margin-top:20px;
}

.summary{
  width:400px;
  margin-left:auto;
  margin-top:30px;
}

.summary td{
  padding:12px;
}

.total-row{
  background:#16a34a;
  color:#fff;
  font-weight:700;
}

.status-box{
  display:flex;
  align-items:center;
  gap:8px;
  background:#fff;
  padding:10px 15px;
  border-radius:12px;
  border:1px solid #ddd;
}

.dot{
  width:14px;
  height:14px;
  border-radius:50%;
  background:#dc2626;
}

.saved{
  margin-top:40px;
}

.saved h2{
  margin-bottom:15px;
}

@media(max-width:768px){

  .invoice{
    padding:18px;
  }

  .title{
    font-size:24px;
  }

  .summary{
    width:100%;
  }

}

@media print{

  .topbar,
  .saved,
  .remove-btn,
  .add-btn{
    display:none !important;
  }

  body{
    background:#fff;
    padding:0;
  }

  .invoice{
    box-shadow:none;
    padding:0;
  }

}

</style>

</head>

<body>

<div class="container">

  <div class="topbar">

    <div class="left-top">

      <button class="dark" onclick="setInvoiceType('PURCHASE INVOICE')">
        Purchase
      </button>

      <button class="dark" onclick="setInvoiceType('SALES INVOICE')">
        Sales
      </button>

    </div>

    <div class="right-top">

      <div class="status-box">

        <div class="dot" id="apiDot"></div>

        <span id="apiText">
          Unlive
        </span>

      </div>

      <button class="blue" onclick="window.print()">
        Print Invoice
      </button>

      <button class="green" onclick="saveInvoice()">
        Save Invoice
      </button>

    </div>

  </div>

  <div class="invoice" id="invoiceArea">

    <div class="title" id="invoiceType">
      PURCHASE INVOICE
    </div>

    <div class="grid">

      <div class="box">

        <label>Company Name</label>

        <input type="text" id="companyName" autocomplete="off">

        <div class="suggestions" id="companySuggestions"></div>

      </div>

      <div class="box">

        <label>Invoice No</label>

        <input type="text" id="invoiceNo">

      </div>

      <div class="box">

        <label>Invoice Date</label>

        <input type="date" id="invoiceDate">

      </div>

    </div>

    <table id="invoiceTable">

      <thead>

        <tr>

          <th>#</th>
          <th>Particular</th>
          <th>MTR</th>
          <th>Rate</th>
          <th>GST</th>
          <th>Total</th>
          <th>Action</th>

        </tr>

      </thead>

      <tbody>

        <tr>

          <td>1</td>

          <td>

            <input type="text" class="particular">

          </td>

          <td>

            <input 
              type="number" 
              step="0.01"
              placeholder="100.70"
              class="mtr"
              oninput="calculateTotal()"
            >

          </td>

          <td>

            <input 
              type="number"
              step="0.01"
              class="rate"
              oninput="calculateTotal()"
            >

          </td>

          <td>

            <select class="gst" onchange="calculateTotal()">

              <option value="0">
                No GST
              </option>

              <option value="5">
                GST 5%
              </option>

            </select>

          </td>

          <td class="amount">
            0.00
          </td>

          <td>

            <button class="remove-btn" onclick="removeRow(this)">
              Remove
            </button>

          </td>

        </tr>

      </tbody>

    </table>

    <button class="dark add-btn" onclick="addRow()">
      + Add Item
    </button>

    <div class="summary">

      <table>

        <tr>
          <td>Subtotal</td>
          <td id="subtotal">0.00</td>
        </tr>

        <tr>
          <td>GST Total</td>
          <td id="gstTotal">0.00</td>
        </tr>

        <tr class="total-row">
          <td>Grand Total</td>
          <td id="grandTotal">0.00</td>
        </tr>

      </table>

    </div>

  </div>

</div>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbxY40ABhc5tmGDuH0b-Yde0Y7yWcswZHt9J8YkCs5eoXUSnPbyvNs6R1wdoYldLm_SG/exec";



async function checkAPI(){

  try{

    const response = await fetch(API_URL + "?t=" + Date.now());

    const data = await response.json();

    if(data.status === "success"){

      document.getElementById("apiDot").style.background = "#16a34a";

      document.getElementById("apiText").innerText = "Live";

    }
    else{

      throw new Error();

    }

  }

  catch(error){

    document.getElementById("apiDot").style.background = "#dc2626";

    document.getElementById("apiText").innerText = "Unlive";

  }

}



function setInvoiceType(type){

  document.getElementById("invoiceType").innerText = type;

}



function calculateTotal(){

  let subtotal = 0;

  let gstTotal = 0;

  document.querySelectorAll("#invoiceTable tbody tr").forEach(row=>{

    const mtr = parseFloat(row.querySelector(".mtr").value) || 0;

    const rate = parseFloat(row.querySelector(".rate").value) || 0;

    const gst = parseFloat(row.querySelector(".gst").value) || 0;

    const amount = mtr * rate;

    const gstAmount = amount * gst / 100;

    const total = amount + gstAmount;

    row.querySelector(".amount").innerText = total.toFixed(2);

    subtotal += amount;

    gstTotal += gstAmount;

  });

  document.getElementById("subtotal").innerText = subtotal.toFixed(2);

  document.getElementById("gstTotal").innerText = gstTotal.toFixed(2);

  document.getElementById("grandTotal").innerText = (subtotal + gstTotal).toFixed(2);

}



function addRow(){

  const tbody = document.querySelector("#invoiceTable tbody");

  const rowCount = tbody.rows.length + 1;

  const row = tbody.insertRow();

  row.innerHTML = `

    <td>${rowCount}</td>

    <td>
      <input type="text" class="particular">
    </td>

    <td>
      <input 
        type="number"
        step="0.01"
        placeholder="100.70"
        class="mtr"
        oninput="calculateTotal()"
      >
    </td>

    <td>
      <input 
        type="number"
        step="0.01"
        class="rate"
        oninput="calculateTotal()"
      >
    </td>

    <td>

      <select class="gst" onchange="calculateTotal()">

        <option value="0">
          No GST
        </option>

        <option value="5">
          GST 5%
        </option>

      </select>

    </td>

    <td class="amount">
      0.00
    </td>

    <td>

      <button class="remove-btn" onclick="removeRow(this)">
        Remove
      </button>

    </td>

  `;

}



function removeRow(button){

  const yes = confirm("Are you sure you want to remove this item?");

  if(yes){

    button.closest("tr").remove();

    updateRowNumbers();

    calculateTotal();

  }

}



function updateRowNumbers(){

  document.querySelectorAll("#invoiceTable tbody tr").forEach((row,index)=>{

    row.cells[0].innerText = index + 1;

  });

}



async function saveInvoice(){

  const items = [];

  document.querySelectorAll("#invoiceTable tbody tr").forEach(row=>{

    items.push({

      particular : row.querySelector(".particular").value,

      mtr : row.querySelector(".mtr").value,

      rate : row.querySelector(".rate").value,

      gst : row.querySelector(".gst").value,

      total : row.querySelector(".amount").innerText

    });

  });



  const payload = {

    action : "saveInvoice",

    invoiceType : document.getElementById("invoiceType").innerText,

    companyName : document.getElementById("companyName").value,

    invoiceNo : document.getElementById("invoiceNo").value,

    invoiceDate : document.getElementById("invoiceDate").value,

    subtotal : document.getElementById("subtotal").innerText,

    gstTotal : document.getElementById("gstTotal").innerText,

    grandTotal : document.getElementById("grandTotal").innerText,

    items : items

  };



  try{

    const response = await fetch(API_URL,{

      method:"POST",

      headers:{
        "Content-Type":"text/plain"
      },

      body:JSON.stringify(payload)

    });

    const result = await response.json();

    if(result.status === "saved"){

      alert("Invoice Saved Successfully");

    }
    else{

      alert("Save Failed");

    }

  }

  catch(error){

    alert("API Error");

  }

}



window.onload = function(){

  document.getElementById("invoiceDate").value =
  new Date().toISOString().split('T')[0];

  document.getElementById("companyName").focus();

  calculateTotal();

  checkAPI();

}

</script>

</body>
</html>
