<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>GST Invoice Generator</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:#f3f4f6;
    padding:20px;
}

.container{
    max-width:1200px;
    margin:auto;
}

.topbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:20px;
    gap:15px;
    flex-wrap:wrap;
}

.type-box{
    display:flex;
    gap:10px;
}

.type-btn{
    padding:12px 22px;
    border:none;
    border-radius:8px;
    background:#111827;
    color:#fff;
    cursor:pointer;
    font-size:15px;
    font-weight:600;
}

.action-btn{
    padding:12px 20px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-weight:600;
    font-size:14px;
}

.save-btn{
    background:#16a34a;
    color:#fff;
}

.print-btn{
    background:#2563eb;
    color:#fff;
}

.invoice{
    background:#fff;
    border-radius:15px;
    padding:30px;
    box-shadow:0 10px 30px rgba(0,0,0,0.08);
}

.header{
    display:flex;
    justify-content:space-between;
    gap:20px;
    flex-wrap:wrap;
    margin-bottom:30px;
}

.logo-box{
    width:180px;
    height:120px;
    border:2px dashed #d1d5db;
    display:flex;
    justify-content:center;
    align-items:center;
    border-radius:10px;
    overflow:hidden;
    position:relative;
}

.logo-box input{
    position:absolute;
    width:100%;
    height:100%;
    opacity:0;
    cursor:pointer;
}

.logo-box img{
    width:100%;
    height:100%;
    object-fit:contain;
}

.editable{
    border:none;
    border-bottom:1px dashed #ccc;
    width:100%;
    outline:none;
    padding:4px;
    font-size:14px;
}

.company-details{
    flex:1;
}

.invoice-title{
    font-size:32px;
    font-weight:700;
    margin-bottom:15px;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:15px;
    margin-bottom:25px;
}

.box{
    border:1px solid #e5e7eb;
    border-radius:10px;
    padding:15px;
}

.box h3{
    margin-bottom:10px;
    font-size:17px;
}

label{
    font-size:13px;
    color:#555;
    margin-top:8px;
    display:block;
}

.table-responsive{
    overflow:auto;
}

table{
    width:100%;
    border-collapse:collapse;
    margin-top:15px;
}

table th{
    background:#111827;
    color:#fff;
    padding:12px;
    font-size:14px;
}

table td{
    border:1px solid #e5e7eb;
    padding:10px;
}

table input{
    width:100%;
    border:none;
    outline:none;
}

.add-row{
    margin-top:15px;
    background:#111827;
    color:#fff;
    border:none;
    padding:10px 16px;
    border-radius:8px;
    cursor:pointer;
}

.summary{
    margin-top:30px;
    margin-left:auto;
    width:350px;
}

.summary table td{
    padding:10px;
}

.total{
    background:#16a34a;
    color:#fff;
    font-weight:700;
}

.note{
    margin-top:30px;
}

.footer{
    margin-top:40px;
    display:flex;
    justify-content:space-between;
    gap:20px;
    flex-wrap:wrap;
}

.signature{
    width:250px;
    text-align:center;
}

.signature-line{
    border-top:1px solid #000;
    margin-top:60px;
    padding-top:8px;
}

@media(max-width:768px){

    .invoice{
        padding:18px;
    }

    .summary{
        width:100%;
    }

    .invoice-title{
        font-size:24px;
    }
}

@media print{
    .topbar,
    .add-row{
        display:none;
    }

    body{
        background:#fff;
        padding:0;
    }

    .invoice{
        box-shadow:none;
    }

    .editable{
        border:none;
    }
}
</style>
</head>

<body>

<div class="container">

    <div class="topbar">

        <div class="type-box">
            <button class="type-btn" onclick="setInvoiceType('PURCHASE INVOICE')">
                Purchase
            </button>

            <button class="type-btn" onclick="setInvoiceType('SALES INVOICE')">
                Sales
            </button>
        </div>

        <div style="display:flex; gap:10px; flex-wrap:wrap;">
            <button class="action-btn print-btn" onclick="window.print()">
                Print Invoice
            </button>

            <button class="action-btn save-btn" onclick="saveInvoice()">
                Save Invoice
            </button>
        </div>

    </div>

    <div class="invoice" id="invoice">

        <div class="header">

            <div class="logo-box">
                <span id="logoText">Upload Logo</span>
                <img id="logoPreview" style="display:none;">
                <input type="file" accept="image/*" onchange="previewLogo(event)">
            </div>

            <div class="company-details">

                <div class="invoice-title" id="invoiceType">
                    SALES INVOICE
                </div>

                <div class="grid">

                    <div>
                        <label>Company Name</label>
                        <input class="editable" value="Your Company Name">
                    </div>

                    <div>
                        <label>Invoice No</label>
                        <input class="editable" value="INV-001">
                    </div>

                    <div>
                        <label>Invoice Date</label>
                        <input type="date" class="editable">
                    </div>

                    <div>
                        <label>Due Date</label>
                        <input type="date" class="editable">
                    </div>

                </div>

                <div class="grid">

                    <div>
                        <label>Company GSTIN</label>
                        <input class="editable" value="">
                    </div>

                    <div>
                        <label>PAN Number</label>
                        <input class="editable" value="">
                    </div>

                    <div>
                        <label>State</label>
                        <input class="editable" value="">
                    </div>

                    <div>
                        <label>State Code</label>
                        <input class="editable" value="">
                    </div>

                </div>

            </div>

        </div>

        <div class="grid">

            <div class="box">

                <h3>Billed To</h3>

                <label>Customer Name</label>
                <input class="editable">

                <label>Address</label>
                <input class="editable">

                <label>Phone</label>
                <input class="editable">

                <label>Email</label>
                <input class="editable">

                <label>GSTIN</label>
                <input class="editable">

            </div>

            <div class="box">

                <h3>Shipping Details</h3>

                <label>Shipping Address</label>
                <input class="editable">

                <label>Transport Name</label>
                <input class="editable">

                <label>Vehicle No</label>
                <input class="editable">

                <label>E-Way Bill No</label>
                <input class="editable">

                <label>Payment Method</label>
                <input class="editable" value="Cash">

            </div>

        </div>

        <div class="table-responsive">

            <table id="invoiceTable">

                <thead>
                    <tr>
                        <th>#</th>
                        <th>Item Description</th>
                        <th>HSN/SAC</th>
                        <th>Qty</th>
                        <th>Rate</th>
                        <th>GST %</th>
                        <th>Amount</th>
                    </tr>
                </thead>

                <tbody>

                    <tr>
                        <td>1</td>

                        <td>
                            <input type="text" placeholder="Item Name">
                        </td>

                        <td>
                            <input type="text" placeholder="HSN">
                        </td>

                        <td>
                            <input type="number" value="1" class="qty" oninput="calculateTotal()">
                        </td>

                        <td>
                            <input type="number" value="0" class="rate" oninput="calculateTotal()">
                        </td>

                        <td>
                            <input type="number" value="18" class="gst" oninput="calculateTotal()">
                        </td>

                        <td class="amount">0.00</td>
                    </tr>

                </tbody>

            </table>

        </div>

        <button class="add-row" onclick="addRow()">
            + Add Item
        </button>

        <div class="summary">

            <table>

                <tr>
                    <td>Subtotal</td>
                    <td id="subtotal">0.00</td>
                </tr>

                <tr>
                    <td>Total GST</td>
                    <td id="gstTotal">0.00</td>
                </tr>

                <tr class="total">
                    <td>Grand Total</td>
                    <td id="grandTotal">0.00</td>
                </tr>

            </table>

        </div>

        <div class="note">

            <label>Terms & Notes</label>

            <textarea class="editable" style="width:100%; height:120px; border:1px solid #ddd; border-radius:10px; padding:12px;">
Thank you for your business.
Goods once sold will not be taken back.
            </textarea>

        </div>

        <div class="footer">

            <div>
                <h4>Bank Details</h4>

                <label>Bank Name</label>
                <input class="editable">

                <label>Account Number</label>
                <input class="editable">

                <label>IFSC Code</label>
                <input class="editable">

            </div>

            <div class="signature">

                <div class="signature-line">
                    Authorized Signature
                </div>

            </div>

        </div>

    </div>

</div>

<script>

function setInvoiceType(type){
    document.getElementById("invoiceType").innerText = type;
}

function previewLogo(event){

    const file = event.target.files[0];

    if(file){

        const reader = new FileReader();

        reader.onload = function(e){

            document.getElementById("logoPreview").src = e.target.result;
            document.getElementById("logoPreview").style.display = "block";
            document.getElementById("logoText").style.display = "none";

        }

        reader.readAsDataURL(file);
    }
}

function addRow(){

    const table = document.querySelector("#invoiceTable tbody");

    const rowCount = table.rows.length + 1;

    const row = table.insertRow();

    row.innerHTML = `
        <td>${rowCount}</td>

        <td>
            <input type="text" placeholder="Item Name">
        </td>

        <td>
            <input type="text" placeholder="HSN">
        </td>

        <td>
            <input type="number" value="1" class="qty" oninput="calculateTotal()">
        </td>

        <td>
            <input type="number" value="0" class="rate" oninput="calculateTotal()">
        </td>

        <td>
            <input type="number" value="18" class="gst" oninput="calculateTotal()">
        </td>

        <td class="amount">0.00</td>
    `;

    calculateTotal();
}

function calculateTotal(){

    const rows = document.querySelectorAll("#invoiceTable tbody tr");

    let subtotal = 0;
    let gstTotal = 0;

    rows.forEach(row => {

        const qty = parseFloat(row.querySelector(".qty").value) || 0;

        const rate = parseFloat(row.querySelector(".rate").value) || 0;

        const gst = parseFloat(row.querySelector(".gst").value) || 0;

        const amount = qty * rate;

        const gstAmount = amount * gst / 100;

        const total = amount + gstAmount;

        row.querySelector(".amount").innerText = total.toFixed(2);

        subtotal += amount;

        gstTotal += gstAmount;

    });

    const grandTotal = subtotal + gstTotal;

    document.getElementById("subtotal").innerText = subtotal.toFixed(2);

    document.getElementById("gstTotal").innerText = gstTotal.toFixed(2);

    document.getElementById("grandTotal").innerText = grandTotal.toFixed(2);
}

function saveInvoice(){

    const invoiceContent = document.getElementById("invoice").innerHTML;

    localStorage.setItem("savedInvoice", invoiceContent);

    alert("Invoice Saved Successfully!");
}

window.onload = function(){

    calculateTotal();

    const saved = localStorage.getItem("savedInvoice");

    if(saved){

        document.getElementById("invoice").innerHTML = saved;
    }
}
</script>

</body>
</html>
